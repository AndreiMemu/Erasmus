<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Selector types</title>
        <link rel="stylesheet" href="style.css"> 
    </head>
    <body>
        <h1>Selector types</h1>

        <!-- Selectors for elements -->
        <p>Element selector for (p)</p>
        <div>Element selector for (div)</div>

        <!-- Class selectors -->
        <p class="rojo">Class selector for (.rojo)</p>
        <p class="grande">Class selector for (.grande)</p>
        <p class="rojo grande">Two classes at the same time(.rojo grande)</p>

        <!-- ID selectors -->
        <p id="unico">ID selector for (#unico)</p>

        <!-- Descendant selectors -->
        <div class="container">
            <p>Direct son</p>
            <div>
                <p>Nested descendant</p>
            </div>
        </div>
    </body>
</html>

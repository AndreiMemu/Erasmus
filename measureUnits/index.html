<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Measure Units</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>Measure units</h1>
    <!-- comparison of measure units -->
    <div class="container">
      <div class="box box-px">
        <!-- PX: absolute - fixed -->
        <h2>px (200px)</h2>
        <p>Absolute size - fixed</p>
      </div>
    </div>

    <!-- %: relative to the father -->
    <div class="box box-percent">
      <h2>%: (50%)</h2>
      <p>Half of the father</p>
    </div>

    <!-- REM: Relative to the root -->
    <div class="box box-rem">
      <h2>REM (15rem)</h2>
      <p>Relative to the root (html)</p>
    </div>

    <!-- EM: relative to the parent element-->
    <div class="box box-em">
      <h2>EM (15em)</h2>
      <p>Relative to the parent element</p>
    </div>

    <!-- VW: viewprt width -->
    <div class="box box-vw">
      <h2>VW (30vw)</h2>
      <p>30% of the viewports size</p>
    </div>

    <!-- VH: viewport height -->
    <div class="box box-vh">
      <h2>VH (20vh)</h2>
      <p>20% of the viewports height</p>
    </div>
  </body>
</html>
